name: Build and Release Managed Solution

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '16'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'
      - name: Install Power Platform CLI
        shell: pwsh
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install npm dependencies
        run: npm install
      - name: Build PCF control
        run: npm run build
      - name: Build solution zip with pac
        shell: pwsh
        run: |
          $controlDir = "out\controls\FinnishSSNControl"
          Write-Host "Control dir contents:"
          Get-ChildItem -Path "out\controls" -Recurse | Select-Object FullName
          pac solution init --publisher-name Bofor --publisher-prefix bfr --outputDirectory SolutionBuild
          pac solution add-reference --path . --outputDirectory SolutionBuild
          pac solution pack --zipFile BoforSSN_managed.zip --folder SolutionBuild --packageType Managed
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Bofor SSN PCF v1.0.${{ github.run_number }}
          files: BoforSSN_managed.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
