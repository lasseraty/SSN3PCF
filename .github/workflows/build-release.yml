name: Build and Release Managed Solution

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '16'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
      - name: Install .NET Framework 4.6.2 targeting pack
        shell: pwsh
        run: choco install netfx-4.6.2-devpack --yes --no-progress --ignore-checksums
      - name: Install Power Platform CLI
        shell: pwsh
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install npm dependencies
        run: npm install
      - name: Build PCF control
        run: npm run build
      - name: Copy manifest and sources to output
        shell: pwsh
        run: |
          $outDir = "out\controls\net462\FinnishSSNControl"
          New-Item -ItemType Directory -Force -Path $outDir
          Copy-Item "ControlManifest.Input.xml" "$outDir\ControlManifest.xml"
          Copy-Item "index.ts" "$outDir\index.ts"
          New-Item -ItemType Directory -Force -Path "$outDir\css"
          Copy-Item "FinnishSSNControl\css\FinnishSSNControl.css" "$outDir\css\FinnishSSNControl.css"
          New-Item -ItemType Directory -Force -Path "$outDir\strings"
          Copy-Item "FinnishSSNControl\strings\FinnishSSNControl.1033.resx" "$outDir\strings\FinnishSSNControl.1033.resx"
          Write-Host "Output dir contents:"
          Get-ChildItem -Path $outDir -Recurse | Select-Object FullName
      - name: Init solution
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path SolutionBuild
          Set-Location SolutionBuild
          pac solution init --publisher-name Bofor --publisher-prefix bfr
          pac solution add-reference --path ../
      - name: Build managed solution
        shell: pwsh
        run: |
          Set-Location SolutionBuild
          $proj = Get-ChildItem -Filter "*.cdsproj" | Select-Object -First 1
          msbuild $proj.FullName /t:build /restore /p:configuration=Release /p:SolutionPackageType=Managed
      - name: Find and rename zip
        shell: pwsh
        id: find_zip
        run: |
          $zip = Get-ChildItem -Path SolutionBuild -Recurse -Filter "*.zip" | Select-Object -First 1
          Write-Host "Found: $($zip.FullName) — $($zip.Length) bytes"
          Copy-Item $zip.FullName "BoforSSN_managed.zip"
          echo "ZIP_PATH=BoforSSN_managed.zip" >> $env:GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Bofor SSN PCF v1.0.${{ github.run_number }}
          files: BoforSSN_managed.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
